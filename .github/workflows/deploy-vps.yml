name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      APP_DIR: /var/www/RegistrationFormFrontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package build
        run: tar -czf frontend-dist.tar.gz dist

      - name: Configure SSH
        run: |
          set -e
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing VPS_HOST, VPS_USER, or VPS_SSH_KEY GitHub secret."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          touch ~/.ssh/known_hosts
          ssh-keyscan -T 20 -H -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload build to VPS
        run: |
          set -e
          scp -i ~/.ssh/vps_key -P "${VPS_PORT:-22}" -o StrictHostKeyChecking=accept-new frontend-dist.tar.gz \
            "$VPS_USER@$VPS_HOST:/tmp/registration-frontend-dist.tar.gz"

      - name: Deploy on VPS
        run: |
          set -e
          ssh -i ~/.ssh/vps_key -p "${VPS_PORT:-22}" -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e

            APP_DIR="/var/www/RegistrationFormFrontend"
            TEMP_DIR="$APP_DIR/.deploy-dist"
            BACKUP_DIR="$APP_DIR/dist.backup.$(date +%Y%m%d%H%M%S)"

            mkdir -p "$APP_DIR"
            rm -rf "$TEMP_DIR"
            mkdir -p "$TEMP_DIR"

            tar -xzf /tmp/registration-frontend-dist.tar.gz -C "$TEMP_DIR"

            if [ -d "$APP_DIR/dist" ]; then
              mv "$APP_DIR/dist" "$BACKUP_DIR"
            fi

            mv "$TEMP_DIR/dist" "$APP_DIR/dist"
            rm -rf "$TEMP_DIR"
            rm -f /tmp/registration-frontend-dist.tar.gz

            if command -v nginx >/dev/null 2>&1; then
              nginx -t
              systemctl reload nginx
            fi
          EOF
